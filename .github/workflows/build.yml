name: build

# Valida o nucleo (testes) e BUILDA o app Tauri nos 3 SOs.
# - push/PR: testa + builda (artefatos anexados ao run) — prova que compila em Linux/macOS/Windows.
# - tag `v*`: alem disso, cria um RELEASE draft com os instaladores (.AppImage/.deb/.dmg/.msi).
#
# Pre-req do Tauri: o frontend (app/) builda via beforeBuildCommand (`npm run build`) e o
# `cargo tauri build` embute o dist/ (o `devUrl` foi removido — sem dev server em runtime).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # necessario p/ o tauri-action criar o release em tags

jobs:
  test-core:
    name: testes do nucleo (devsplit-core)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p devsplit-core

  build:
    name: build (${{ matrix.platform }})
    needs: test-core
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache do Rust (workspace da casca Tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Dependencias nativas (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Dependencias do frontend
        run: npm ci
        working-directory: ./app

      - name: Build do app Tauri (+ release draft em tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assinatura/notarizacao (preencher como secrets quando for publicar):
          # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID  (macOS notarizacao)
          # TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD (updater)
        with:
          projectPath: ./app
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('devsplit {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Anexar instaladores ao run (push/PR, sem tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: devsplit-${{ matrix.platform }}
          path: |
            app/src-tauri/target/release/bundle/**/*.AppImage
            app/src-tauri/target/release/bundle/**/*.deb
            app/src-tauri/target/release/bundle/**/*.rpm
            app/src-tauri/target/release/bundle/**/*.dmg
            app/src-tauri/target/release/bundle/**/*.msi
            app/src-tauri/target/release/bundle/**/*-setup.exe
          if-no-files-found: ignore
