name: security-scan

# Varredura de seguranca do devsplit. Resultados (CodeQL + Trivy) aparecem na
# aba "Security" do GitHub via SARIF. Politica de falha:
#   - gitleaks .......... quebra se achar QUALQUER segredo no historico/arvore
#   - cargo-audit ....... quebra em vulnerabilidade RustSec (avisos de crate nao
#                         mantido/unsound apenas reportam, nao quebram)
#   - npm audit ......... quebra em severidade high+
#   - Trivy ............. envia TODAS as severidades p/ a aba Security, mas so
#                         QUEBRA o build em HIGH/CRITICAL (medias/baixas ficam
#                         visiveis sem travar — ex.: glib transitivo do Tauri)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # semanal (seg 06:00 UTC): pega CVE nova em dep que nao mudou
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # upload de SARIF p/ a aba Security
  actions: read

jobs:
  # ── SAST: CodeQL no frontend (TS) e no Rust (engine + casca) ──
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # build-mode `none`: extracao sem compilar (sem precisar de webkit/GTK no
        # runner). Rust no CodeQL e recente; a casca Tauri tem extracao parcial,
        # mas cobre TS + engine devsplit-core (parte sensivel: proxy/TLS/DNS).
        language: [javascript-typescript, rust]
    steps:
      - uses: actions/checkout@v4
      - name: Inicializa CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - name: Analisa
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── Vulnerabilidades em dependencias: RustSec (Cargo) + npm ──
  deps:
    name: Vulnerabilidades em dependencias
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Instala cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Os DOIS lockfiles (o app Tauri puxa o core por path, com seu proprio lock).
      - name: cargo audit (workspace raiz)
        run: cargo audit -f Cargo.lock
      - name: cargo audit (app Tauri)
        run: cargo audit -f app/src-tauri/Cargo.lock

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        working-directory: ./app

  # ── CVEs de deps + misconfig + secret (Trivy) → aba Security ──
  trivy:
    name: Trivy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Trivy → SARIF (todas severidades, nao quebra)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: app/src-tauri/target,app/node_modules
          format: sarif
          output: trivy.sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"
      - name: Envia SARIF do Trivy
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Trivy gate (quebra so em HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          skip-dirs: app/src-tauri/target,app/node_modules
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ── Segredos: historico git completo ──
  gitleaks:
    name: gitleaks (segredos)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historico completo p/ varrer todos os commits
      - name: Instala gitleaks
        run: |
          curl -fsSL -o gl.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gl.tgz gitleaks
      - name: Varredura (historico)
        run: ./gitleaks git . --redact --exit-code 1
